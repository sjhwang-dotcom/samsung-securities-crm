<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <circle cx="24" cy="24" r="24" fill="#1E293B"/>
  <!-- 4-point star: light spreading outward -->
  <path d="M24 4 C24.8 18 24 20 24 20 C24 20 23.2 18 24 4Z" fill="url(#starG)" opacity="0.9"/>
  <path d="M24 44 C24.8 30 24 28 24 28 C24 28 23.2 30 24 44Z" fill="url(#starG)" opacity="0.9"/>
  <path d="M4 24 C18 24.8 20 24 20 24 C20 24 18 23.2 4 24Z" fill="url(#starG)" opacity="0.9"/>
  <path d="M44 24 C30 24.8 28 24 28 24 C28 24 30 23.2 44 24Z" fill="url(#starG)" opacity="0.9"/>
  <!-- Wider rays for more visible star -->
  <path d="M24 6 L25.5 20 L24 18 L22.5 20 Z" fill="url(#rayG)"/>
  <path d="M24 42 L25.5 28 L24 30 L22.5 28 Z" fill="url(#rayG)"/>
  <path d="M6 24 L20 22.5 L18 24 L20 25.5 Z" fill="url(#rayG)"/>
  <path d="M42 24 L28 22.5 L30 24 L28 25.5 Z" fill="url(#rayG)"/>
  <!-- Diagonal subtle rays -->
  <path d="M11 11 L20 21 L19 20 Z" fill="#D97706" opacity="0.35"/>
  <path d="M37 11 L28 21 L29 20 Z" fill="#D97706" opacity="0.35"/>
  <path d="M11 37 L20 27 L19 28 Z" fill="#D97706" opacity="0.35"/>
  <path d="M37 37 L28 27 L29 28 Z" fill="#D97706" opacity="0.35"/>
  <!-- Inner glow -->
  <circle cx="24" cy="24" r="6" fill="url(#glowG)" opacity="0.4"/>
  <circle cx="24" cy="24" r="3.5" fill="url(#coreG)"/>
  <circle cx="24" cy="24" r="2" fill="#FDE68A"/>
  <defs>
    <linearGradient id="starG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="rayG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="50%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <radialGradient id="glowG" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreG" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="50%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </radialGradient>
  </defs>
</svg>
